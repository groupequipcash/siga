<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f5f5f5, #eaeaea);
  font-family: Arial, sans-serif;
}

/* BOTÃO */
.btn {
  padding: 18px 45px;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  text-decoration: none;
  border-radius: 40px;
  background: linear-gradient(90deg, #ff2e5f, #2b0b13);
  box-shadow: 0 10px 25px rgba(255, 46, 95, 0.3);
  transition: all 0.3s ease;
}

/* EFEITO HOVER */
.btn:hover {
  transform: translateY(-3px) scale(1.03);
  box-shadow: 0 15px 35px rgba(255, 46, 95, 0.5);
}

/* EFEITO CLICK */
.btn:active {
  transform: scale(0.98);
}
</style>
</head>
